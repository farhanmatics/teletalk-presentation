<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teletalk Presentation – Export to PDF</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: system-ui, sans-serif;
        background: #1a1a1a;
        color: #fff;
        padding: 20px;
      }

      .toolbar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        padding: 12px 24px;
        background: #262626;
        display: flex;
        align-items: center;
        justify-content: space-between;
        z-index: 100;
        border-bottom: 1px solid #333;
      }

      .toolbar h1 {
        font-size: 16px;
        font-weight: 600;
      }

      .toolbar button {
        background: #009a44;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }

      .toolbar button:hover {
        background: #008038;
      }

      .toolbar .hint {
        font-size: 12px;
        color: #999;
        margin-left: 12px;
      }

      .slides-container {
        margin-top: 60px;
      }

      .slide-page {
        width: 100%;
        height: 100vh;
        min-height: 720px;
        position: relative;
        margin-bottom: 2px;
        break-after: page;
        page-break-after: always;
      }

      .slide-page iframe {
        width: 100%;
        height: 100%;
        border: none;
        display: block;
      }

      @media print {
        body {
          background: white;
          padding: 0;
        }

        .toolbar {
          display: none !important;
        }

        .slides-container {
          margin-top: 0;
        }

        .slide-page {
          height: 100vh;
          min-height: 100vh;
          margin: 0;
          padding: 0;
          break-after: page;
          page-break-after: always;
        }

        .slide-page:last-child {
          page-break-after: auto;
        }

        .slide-page iframe {
          width: 100%;
          height: 100%;
        }
      }

      @page {
        size: landscape;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div class="toolbar">
      <div>
        <h1>Teletalk Presentation – 15 slides</h1>
        <span class="hint">Wait for slides to load, then click Save as PDF. Use Landscape and “Save as PDF” as destination.</span>
      </div>
      <button type="button" id="printBtn">Save as PDF</button>
    </div>
    <div class="slides-container" id="slidesContainer"></div>

    <script>
      const SLIDES = [
        'slide1.html', 'slide2.html', 'slide3.html', 'slide4.html', 'slide5.html',
        'slide6.html', 'slide7.html', 'slide8.html', 'slide9.html', 'slide10.html',
        'slide11.html', 'slide12.html', 'slide13.html', 'slide14.html', 'slide15.html'
      ];

      const container = document.getElementById('slidesContainer');
      SLIDES.forEach((src) => {
        const div = document.createElement('div');
        div.className = 'slide-page';
        const iframe = document.createElement('iframe');
        iframe.src = src;
        iframe.title = 'Slide';
        div.appendChild(iframe);
        container.appendChild(div);
      });

      document.getElementById('printBtn').addEventListener('click', () => {
        window.print();
      });
    </script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teletalk Presentation</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }

      .slide-frame {
        width: 100%;
        height: 100%;
        border: none;
        display: block;
      }

      .controls {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 12px 24px;
        background: linear-gradient(transparent, rgba(0, 0, 0, 0.85));
        color: rgba(255, 255, 255, 0.8);
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 14px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        z-index: 100;
        pointer-events: none;
      }

      .controls .hint {
        opacity: 0.7;
      }

      .controls .slide-num {
        font-weight: 600;
        color: #fff;
      }

      .controls .nav-hint {
        display: flex;
        gap: 16px;
      }
    </style>
  </head>
  <body>
    <iframe
      id="slide"
      class="slide-frame"
      src="slide1.html"
      title="Presentation slide"
    ></iframe>

    <div class="controls" id="controls">
      <span class="hint">Teletalk Partnership Proposal</span>
      <span class="slide-num" id="slideNum">1 / 3</span>
      <span class="nav-hint">
        <kbd>←</kbd> <kbd>→</kbd> or <kbd>Space</kbd>
      </span>
    </div>

    <script>
      const SLIDES = [
      'slide1.html', 'slide2.html', 'slide3.html', 'slide4.html', 'slide5.html',
      'slide6.html', 'slide7.html', 'slide8.html', 'slide9.html', 'slide10.html',
      'slide11.html', 'slide12.html', 'slide13.html', 'slide14.html', 'slide15.html'
    ];
      const iframe = document.getElementById('slide');
      const slideNumEl = document.getElementById('slideNum');
      const controls = document.getElementById('controls');

      let currentIndex = 0;

      function goTo(index) {
        if (index < 0 || index >= SLIDES.length) return;
        currentIndex = index;
        iframe.src = SLIDES[currentIndex];
        slideNumEl.textContent = `${currentIndex + 1} / ${SLIDES.length}`;
      }

      function next() {
        goTo(currentIndex + 1);
      }

      function prev() {
        goTo(currentIndex - 1);
      }

      document.addEventListener('keydown', (e) => {
        switch (e.key) {
          case 'ArrowRight':
          case ' ':
            e.preventDefault();
            next();
            break;
          case 'ArrowLeft':
            e.preventDefault();
            prev();
            break;
          case 'Home':
            e.preventDefault();
            goTo(0);
            break;
          case 'End':
            e.preventDefault();
            goTo(SLIDES.length - 1);
            break;
        }
      });

      // Optional: hide controls after 2s of no movement (cleaner fullscreen)
      let hideTimeout;
      function scheduleHideControls() {
        clearTimeout(hideTimeout);
        controls.style.opacity = '1';
        hideTimeout = setTimeout(() => {
          controls.style.opacity = '0';
          controls.style.transition = 'opacity 0.3s';
        }, 2500);
      }

      document.addEventListener('mousemove', scheduleHideControls);
      document.addEventListener('keydown', scheduleHideControls);
      scheduleHideControls();
    </script>
  </body>
</html>
